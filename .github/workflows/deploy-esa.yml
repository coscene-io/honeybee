name: deploy-esa

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy web
    runs-on: gcp
    environment: saas
    timeout-minutes: 30

    env:
      GH_PACKAGES_ORG_TOKEN: ${{ secrets.GH_PACKAGES_ORG_TOKEN }}
      ESA_ACCESS_KEY: ${{ secrets.ESA_ACCESS_KEY }}
      ESA_SECRET_KEY: ${{ secrets.ESA_SECRET_KEY }}
      CONFIG_FILE_URL: ${{ vars.CONFIG_FILE_URL }}
      ESA_DOMAIN: viewer.coscene.cn
      ESA_SITE_NAME: coscene.cn
      ESA_ROUTE_NAME: viewer-coscene-cn
      HONEYBEE_WEB_PUBLIC_PATH: /
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          : "${GH_PACKAGES_ORG_TOKEN:?GH_PACKAGES_ORG_TOKEN secret is required}"
          : "${ESA_ACCESS_KEY:?ESA_ACCESS_KEY secret is required}"
          : "${ESA_SECRET_KEY:?ESA_SECRET_KEY secret is required}"
          : "${CONFIG_FILE_URL:?CONFIG_FILE_URL variable is required}"
          : "${ESA_DOMAIN:?ESA_DOMAIN variable is required}"
          : "${ESA_SITE_NAME:?ESA_SITE_NAME variable is required}"
          : "${ESA_ROUTE_NAME:?ESA_ROUTE_NAME variable is required}"

      - name: Enable corepack
        run: corepack enable yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Set cos config file
        run: |
          set -euo pipefail
          curl -fsSL "${CONFIG_FILE_URL}" -o packages/studio-web/public/cos-config.js

      - name: Build web production files
        run: yarn run web:build:prod

      - name: Validate web artifacts
        run: |
          set -euo pipefail
          test -s web/.webpack/index.html
          find web/.webpack -type f -name '*.js' -print -quit | grep -q .
          if grep -q '/viz/cos-config.js' web/.webpack/index.html; then
            echo "index.html still references /viz/cos-config.js"
            exit 1
          fi
          grep -q '/cos-config.js' web/.webpack/index.html

      - name: Deploy to ESA
        env:
          ESA_ACCESS_KEY_ID: ${{ secrets.ESA_ACCESS_KEY }}
          ESA_ACCESS_KEY_SECRET: ${{ secrets.ESA_SECRET_KEY }}
        run: |
          set -euo pipefail

          yarn exec esa-cli --version
          yarn exec esa-cli login
          yarn exec esa-cli deploy --environment production

          domain_list="$(yarn exec esa-cli domain list 2>&1)"
          printf '%s\n' "${domain_list}"
          if ! printf '%s\n' "${domain_list}" | grep -Fq "${ESA_DOMAIN}"; then
            yarn exec esa-cli domain add "${ESA_DOMAIN}"
            domain_list="$(yarn exec esa-cli domain list 2>&1)"
            printf '%s\n' "${domain_list}"
          fi
          if ! printf '%s\n' "${domain_list}" | grep -Fq "${ESA_DOMAIN}"; then
            echo "ESA domain ${ESA_DOMAIN} was not found after binding"
            exit 1
          fi

          route_list="$(yarn exec esa-cli route list 2>&1)"
          printf '%s\n' "${route_list}"
          if ! printf '%s\n' "${route_list}" | grep -Fq "${ESA_ROUTE_NAME}"; then
            yarn exec esa-cli route add "${ESA_DOMAIN}/*" "${ESA_SITE_NAME}" --alias "${ESA_ROUTE_NAME}"
            route_list="$(yarn exec esa-cli route list 2>&1)"
            printf '%s\n' "${route_list}"
          fi
          if ! printf '%s\n' "${route_list}" | grep -Fq "${ESA_ROUTE_NAME}"; then
            echo "ESA route ${ESA_ROUTE_NAME} was not found after binding"
            exit 1
          fi
